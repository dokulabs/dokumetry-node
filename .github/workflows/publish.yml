name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number to release'
        required: true

permissions:
  contents: write

env:
  OPENAI_API_TOKEN: ${{ secrets.OPENAI_API_TOKEN }}
  COHERE_API_TOKEN: ${{ secrets.COHERE_API_TOKEN }}
  DOKU_URL: ${{ secrets.DOKU_URL }}
  DOKU_TOKEN: ${{ secrets.DOKU_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
      
      - run: npm ci
      
      - name: NPM Test
        run: npm test

  publish:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          registry-url: https://registry.npmjs.org/
      
      - run: npm ci
      
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
  
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "node-${{ github.event.inputs.version }}"